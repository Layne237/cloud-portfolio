AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch monitoring dashboard and alarms for the portfolio stack.
Parameters:
  DashboardName:
    Type: String
    Default: PortfolioMonitoringDashboard
    Description: CloudWatch Dashboard name.
  LambdaFunctionName:
    Type: String
    Default: PortfolioBackendFunction
    Description: A representative Lambda function name for dashboard metrics.
  ApiName:
    Type: String
    Default: PortfolioApi
    Description: The API Gateway name or ApiName dimension for metric widgets.
  ApiStage:
    Type: String
    Default: prod
    Description: API Gateway stage name.
  DynamoDbTableName:
    Type: String
    Default: PortfolioTable
    Description: DynamoDB table name for capacity monitoring.
  WebVitalsNamespace:
    Type: String
    Default: Portfolio/WebVitals
    Description: Namespace for frontend custom metrics.
Resources:
  PortfolioMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Lambda Invocation Count",
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${LambdaFunctionName}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Lambda Duration (ms)",
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${LambdaFunctionName}", { "stat": "p95" } ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "API Gateway Latency",
                "metrics": [
                  [ "AWS/ApiGateway", "Latency", "ApiName", "${ApiName}", "Stage", "${ApiStage}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "API Gateway Error Rate",
                "metrics": [
                  [ "AWS/ApiGateway", "5XXError", "ApiName", "${ApiName}", "Stage", "${ApiStage}" ],
                  [ ".", "4XXError", "ApiName", "${ApiName}", "Stage", "${ApiStage}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "DynamoDB Read Capacity",
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${DynamoDbTableName}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "DynamoDB Write Capacity",
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${DynamoDbTableName}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Frontend Web Vitals",
                "metrics": [
                  [ "${WebVitalsNamespace}", "PageLoadTime", "Page", "portfolio" ],
                  [ ".", "LCP", "Page", "portfolio" ],
                  [ ".", "FID", "Page", "portfolio" ],
                  [ ".", "CLS", "Page", "portfolio" ]
                ]
              }
            }
          ]
        }

  ApiErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${DashboardName}-ApiErrorRate"
      AlarmDescription: "Alert when API Gateway error rate exceeds 1% over 5 minutes."
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: AWS/ApiGateway
              MetricName: 5XXError
              Dimensions:
                - Name: ApiName
                  Value: !Ref ApiName
                - Name: Stage
                  Value: !Ref ApiStage
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: requests
          MetricStat:
            Metric:
              Namespace: AWS/ApiGateway
              MetricName: Count
              Dimensions:
                - Name: ApiName
                  Value: !Ref ApiName
                - Name: Stage
                  Value: !Ref ApiStage
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: errorRate
          Expression: "errors / requests * 100"
          Label: "API Error Rate (%)"
          ReturnData: true
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing

  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${DashboardName}-ApiLatency"
      AlarmDescription: "Alert when API Gateway latency exceeds 500ms over 5 minutes."
      Namespace: AWS/ApiGateway
      MetricName: Latency
      Dimensions:
        - Name: ApiName
          Value: !Ref ApiName
        - Name: Stage
          Value: !Ref ApiStage
      Statistic: p95
      Period: 300
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${DashboardName}-LambdaThrottle"
      AlarmDescription: "Alert when Lambda throttle errors occur."
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunctionName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing
